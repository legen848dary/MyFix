<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <base href="/"/>
  <title>TheFixClient — Trader Workstation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      color-scheme: light;
      --bg: #f4f2ef;
      --bg-soft: #fbfaf8;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #ffffff;
      --surface-muted: rgba(255, 255, 255, 0.55);
      --border: rgba(40, 50, 63, 0.10);
      --border-strong: rgba(40, 50, 63, 0.18);
      --text: #1c222b;
      --text-soft: #58616d;
      --text-faint: #7b8491;
      --brand: #d71920;
      --brand-strong: #b50f18;
      --brand-soft: rgba(215, 25, 32, 0.10);
      --danger: #d71920;
      --danger-soft: rgba(215, 25, 32, 0.10);
      --success: #0f8f61;
      --success-soft: rgba(15, 143, 97, 0.10);
      --warn: #b7791f;
      --warn-soft: rgba(183, 121, 31, 0.10);
      --info: #2563eb;
      --info-soft: rgba(37, 99, 235, 0.10);
      --shadow: 0 20px 50px rgba(19, 30, 41, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    body[data-theme='light2'] {
      color-scheme: light;
      --bg: #ece8e1;
      --bg-soft: #f5f1ea;
      --surface: rgba(252, 249, 244, 0.88);
      --surface-strong: #f8f4ee;
      --surface-muted: rgba(250, 246, 239, 0.74);
      --border: rgba(64, 72, 84, 0.14);
      --border-strong: rgba(64, 72, 84, 0.22);
    }

    body[data-theme='dark'] {
      color-scheme: dark;
      --bg: #0a0f1e;
      --bg-soft: #0f172a;
      --surface: rgba(15, 23, 42, 0.94);
      --surface-strong: #0f172a;
      --surface-muted: rgba(30, 41, 59, 0.78);
      --border: rgba(51, 65, 85, 0.95);
      --border-strong: rgba(71, 85, 105, 0.96);
      --text: #f8fafc;
      --text-soft: #cbd5e1;
      --text-faint: #94a3b8;
      --brand: #22c55e;
      --brand-strong: #15803d;
      --brand-soft: rgba(34, 197, 94, 0.16);
      --danger: #f87171;
      --danger-soft: rgba(248, 113, 113, 0.16);
      --success: #22c55e;
      --success-soft: rgba(34, 197, 94, 0.16);
      --warn: #facc15;
      --warn-soft: rgba(250, 204, 21, 0.16);
      --info: #38bdf8;
      --info-soft: rgba(56, 189, 248, 0.16);
      --shadow: 0 22px 48px rgba(2, 6, 23, 0.42);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(215, 25, 32, 0.06), transparent 32%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      color: var(--text);
      transition: background 180ms ease, color 180ms ease;
    }

    body[data-theme='dark'] {
      background: #0a0f1e;
    }

    button, input, select {
      font: inherit;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(127, 137, 149, 0.35);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    body[data-theme='dark'] ::-webkit-scrollbar { width: 6px; height: 6px; }
    body[data-theme='dark'] ::-webkit-scrollbar-track { background: #1e293b; }
    body[data-theme='dark'] ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 999px;
      border: 0;
    }

    .shell {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      padding: 18px 22px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-strong);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .brand { display: flex; gap: 14px; align-items: center; }
    .brand__mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      color: white;
      font-weight: 700;
      letter-spacing: 0.08em;
      box-shadow: 0 16px 30px color-mix(in srgb, var(--brand) 32%, transparent);
    }
    .brand__eyebrow {
      margin: 0 0 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: var(--brand);
      font-weight: 700;
    }
    .brand__title {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
    }
    .brand__subtitle {
      margin: 8px 0 0;
      color: var(--text-soft);
      max-width: 760px;
      font-size: 15px;
    }

    .topbar__actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .topbar__controls {
      display: flex;
      align-items: stretch;
      gap: 10px;
      flex-wrap: wrap;
    }

    .menu-wrap {
      position: relative;
    }

    .menu-button {
      min-width: 220px;
      min-height: 56px;
      padding: 10px 14px 10px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text);
      font-weight: 650;
      cursor: pointer;
      text-align: left;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-areas:
        'label caret'
        'value caret';
      column-gap: 12px;
      row-gap: 2px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .menu-button:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
    }

    .menu-button__label {
      grid-area: label;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-faint);
      font-weight: 700;
    }

    .menu-button__value {
      grid-area: value;
      font-size: 14px;
      color: var(--text);
      font-weight: 700;
    }

    .menu-button__caret {
      grid-area: caret;
      align-self: center;
      font-size: 15px;
      color: var(--brand);
      transition: transform 140ms ease;
    }

    .menu-button__caret--open {
      transform: rotate(180deg);
    }

    .menu-panel {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 220px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      display: grid;
      gap: 6px;
      z-index: 10;
    }

    .menu-panel__item {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      font-weight: 600;
      text-align: left;
      cursor: pointer;
    }

    .menu-panel__item:hover,
    .menu-panel__item--active {
      background: var(--brand-soft);
      color: var(--brand);
      border-color: color-mix(in srgb, var(--brand) 20%, transparent);
    }

    .button,
    .segmented__option,
    .tab {
      border: 1px solid transparent;
      border-radius: 999px;
      transition: all 140ms ease;
      cursor: pointer;
    }

    .theme-select {
      display: grid;
      grid-template-columns: 1fr;
      align-content: center;
      gap: 4px;
      padding: 10px 14px 10px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-soft);
      min-width: 220px;
      min-height: 56px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .theme-select__label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .theme-select__control {
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      outline: none;
      min-width: 0;
      cursor: pointer;
      padding: 0;
    }

    .refresh-select {
      min-width: 220px;
    }

    .menu-button,
    .theme-select,
    .refresh-select {
      height: 56px;
    }

    .menu-button:focus-visible,
    .theme-select:focus-within {
      outline: 2px solid color-mix(in srgb, var(--brand) 70%, white);
      outline-offset: 2px;
      border-color: color-mix(in srgb, var(--brand) 46%, var(--border-strong));
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
      white-space: nowrap;
    }
    .status-indicator__dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      display: inline-block;
    }
    .status-indicator--live { color: var(--brand); }
    .status-indicator--flow { color: var(--brand); }
    .status-indicator--warn { color: var(--warn); }
    .status-indicator--idle { color: var(--text-faint); }

    body[data-theme='dark'] .topbar,
    body[data-theme='dark'] .panel {
      backdrop-filter: none;
    }

    body[data-theme='dark'] .topbar {
      background: #0f172a;
      border-color: var(--border);
      box-shadow: none;
    }

    body[data-theme='dark'] .panel {
      background: #0f172a;
      border-color: var(--border);
      box-shadow: none;
    }

    body[data-theme='dark'] .panel--subtle {
      background: transparent;
      box-shadow: none;
    }

    body[data-theme='dark'] .menu-button,
    body[data-theme='dark'] .theme-select,
    body[data-theme='dark'] .compact-card,
    body[data-theme='dark'] .segmented,
    body[data-theme='dark'] .event,
    body[data-theme='dark'] .order-row,
    body[data-theme='dark'] .market-hint,
    body[data-theme='dark'] .orders-table__scroll,
    body[data-theme='dark'] .empty-state {
      background: #1e293b;
      border-color: var(--border);
      box-shadow: none;
    }

    body[data-theme='dark'] .menu-panel {
      background: #0f172a;
      border-color: var(--border);
      box-shadow: none;
    }

    body[data-theme='dark'] .field input,
    body[data-theme='dark'] .field select {
      background: #1e293b;
      border-color: var(--border);
    }

    body[data-theme='dark'] .template-picker__control {
      background: #1e293b;
      border-color: var(--border);
    }

    body[data-theme='dark'] .field input:focus,
    body[data-theme='dark'] .field select:focus {
      border-color: color-mix(in srgb, var(--brand) 65%, white);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--brand) 18%, transparent);
    }

    body[data-theme='dark'] .button,
    body[data-theme='dark'] .tab,
    body[data-theme='dark'] .segmented__option {
      box-shadow: none;
    }

    body[data-theme='dark'] .button {
      background: #1e293b;
      border-color: var(--border);
    }

    body[data-theme='dark'] .button--soft {
      background: var(--brand-soft);
      color: var(--brand);
      border-color: color-mix(in srgb, var(--brand) 24%, transparent);
    }

    body[data-theme='dark'] .button--ghost {
      background: transparent;
      color: #e2e8f0;
    }

    body[data-theme='dark'] .button--success {
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      border-color: color-mix(in srgb, var(--brand) 36%, transparent);
      color: #ffffff;
      box-shadow: 0 12px 24px color-mix(in srgb, var(--brand) 26%, transparent);
    }

    body[data-theme='dark'] .button--danger {
      background: linear-gradient(135deg, #4a1619, #1b0a0b);
      border-color: rgba(122, 33, 39, 0.9);
      color: #ffffff;
      box-shadow: 0 12px 24px rgba(27, 10, 11, 0.32);
    }

    body[data-theme='dark'] .tab {
      background: #0f172a;
      border-color: var(--border);
      color: #cbd5e1;
      opacity: 0.78;
    }

    body[data-theme='dark'] .tab--active {
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      color: #ffffff;
      border-color: color-mix(in srgb, var(--brand) 60%, white);
      box-shadow:
        0 0 0 2px rgba(34, 197, 94, 0.28),
        0 14px 28px rgba(21, 128, 61, 0.30);
      opacity: 1;
    }

    body[data-theme='dark'] .segmented__option--active {
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      border-color: var(--border-strong);
      color: white;
    }

    body[data-theme='dark'] .segmented__option {
      color: #cbd5e1;
    }

    body[data-theme='dark'] .button,
    body[data-theme='dark'] .tab,
    body[data-theme='dark'] .segmented__option,
    body[data-theme='dark'] .menu-button,
    body[data-theme='dark'] .theme-select {
      border-color: #334155;
    }

    body[data-theme='dark'] .button:not(:disabled):not(.button--primary):not(.button--success):not(.button--danger):hover,
    body[data-theme='dark'] .tab:not(.tab--active):hover,
    body[data-theme='dark'] .segmented__option:not(.segmented__option--active):hover {
      background: #273449;
      color: #f8fafc;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(330px, 0.95fr);
      gap: 22px;
      margin-top: 22px;
    }

    .page-grid {
      display: grid;
      grid-template-columns: minmax(0, 7fr) minmax(320px, 3fr);
      gap: 22px;
      margin-top: 22px;
      align-items: start;
    }

    .workspace--single {
      grid-template-columns: 1fr;
    }

    .stack { display: grid; gap: 22px; }

    .panel {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel--focus {
      border-color: color-mix(in srgb, var(--brand) 16%, var(--border));
    }

    .panel--compact .panel__header {
      padding-bottom: 0;
    }

    .panel--compact .panel__body {
      padding-top: 16px;
    }

    .panel--metrics .panel__header {
      padding: 14px 18px 0;
      align-items: center;
      gap: 12px;
    }

    .panel--metrics .panel__body {
      padding: 12px 18px 16px;
    }

    .panel--subtle {
      border-radius: var(--radius-lg);
      border-color: var(--border);
      box-shadow: none;
      background: transparent;
    }

    .panel__header {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      padding: 18px 20px;
      border-bottom: 1px solid var(--border);
    }
    .panel__title {
      margin: 0;
      font-size: 19px;
    }
    .panel__copy {
      margin: 8px 0 0;
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.5;
    }
    .panel__body {
      padding: 18px 20px 20px;
    }

    .panel__body--metrics {
      padding-top: 12px;
    }

    .hero-grid,
    .stats-grid,
    .summary-grid,
    .order-grid,
    .bulk-grid {
      display: grid;
      gap: 16px;
    }

    .hero-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .stats-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .order-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .bulk-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }

    .compact-grid,
    .metrics-strip {
      display: grid;
      gap: 14px;
    }

    .compact-grid {
      grid-template-columns: 1.4fr minmax(0, 1fr) auto;
      align-items: center;
    }

    .metrics-strip {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }

    .metrics-strip--compact {
      gap: 10px;
      align-items: stretch;
    }

    .metric,
    .summary-card,
    .session-stat,
    .preview-card,
    .event,
    .order-row,
    .market-hint {
      border: 1px solid var(--border);
      background: var(--surface-muted);
      border-radius: var(--radius-lg);
    }

    .session-stat,
    .metric,
    .summary-card,
    .preview-card,
    .market-hint {
      padding: 16px 18px;
    }

    .compact-card {
      padding: 14px 16px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      border-radius: 12px;
      min-width: 0;
    }

    .compact-card--metric-tile {
      padding: 10px 12px;
      border-radius: 14px;
    }

    .compact-card__value {
      margin: 8px 0 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.35;
    }

    .compact-card--metric-tile .compact-card__value {
      margin-top: 4px;
      font-size: 16px;
      line-height: 1.2;
    }

    .compact-card__copy {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--text-soft);
      line-height: 1.45;
    }

    .compact-card--metric-tile .compact-card__copy {
      margin-top: 2px;
      font-size: 11px;
      line-height: 1.2;
    }

    .compact-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
      align-items: center;
    }

    .compact-actions--stacked {
      justify-content: stretch;
      align-content: start;
    }

    .compact-actions--stacked .button {
      width: 100%;
    }

    .compact-stack {
      display: grid;
      gap: 12px;
    }

    .eyebrow {
      margin: 0;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.20em;
    }
    .metric__value,
    .summary-card__value,
    .session-stat__value {
      margin: 10px 0 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .metric__copy,
    .summary-card__copy,
    .session-stat__copy {
      margin: 8px 0 0;
      font-size: 13px;
      color: var(--text-soft);
      line-height: 1.45;
    }

    .session-bar,
    .tab-bar,
    .segmented,
    .button-row,
    .chip-row,
    .preview-list,
    .compact-meta,
    .order-meta,
    .event-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .tab-bar {
      padding: 0 24px;
      margin-top: 4px;
    }

    .tab-bar--inline {
      padding: 0;
      margin-top: 0;
    }

    .workflow-toolbar {
      display: grid;
      gap: 12px;
      padding: 0 24px;
      margin-top: 4px;
    }

    .workflow-toolbar__row {
      display: flex;
      align-items: end;
      gap: 12px;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    .workflow-toolbar__actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .workflow-toolbar__templates {
      display: flex;
      align-items: end;
      gap: 10px;
      flex-wrap: wrap;
      width: 100%;
    }

    .template-picker {
      display: grid;
      gap: 8px;
      min-width: 240px;
    }

    .template-picker__label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .template-picker__control {
      width: 100%;
      min-width: 0;
      min-height: 44px;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: var(--surface-strong);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
    }

    .template-picker__control:focus {
      border-color: color-mix(in srgb, var(--brand) 58%, white);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--brand) 12%, transparent);
    }

    .field--template-name {
      min-width: 240px;
    }

    .workflow-toolbar__row--actions .tab-bar {
      padding: 0;
      margin-top: 0;
    }

    .tab {
      padding: 11px 16px;
      background: var(--surface-muted);
      border-color: var(--border);
      color: var(--text-soft);
      font-weight: 600;
      opacity: 0.82;
    }
    .tab--active {
      color: white;
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      border-color: color-mix(in srgb, var(--brand) 52%, white);
      box-shadow:
        0 0 0 2px color-mix(in srgb, var(--brand) 24%, transparent),
        0 12px 24px color-mix(in srgb, var(--brand) 26%, transparent);
      font-weight: 700;
      opacity: 1;
      transform: translateY(-1px);
    }

    .field {
      display: grid;
      gap: 8px;
      min-width: 0;
    }
    .field--span-2 { grid-column: span 2; }
    .field label,
    .field__label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }
    .field input,
    .field select {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      background: var(--surface-strong);
      color: var(--text);
      padding: 10px 12px;
      outline: none;
      transition: border-color 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }
    .field input:focus,
