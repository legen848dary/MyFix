<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <base href="/"/>
  <title>TheFixClient — Trader Workstation</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      color-scheme: light;
      --bg: #f4f2ef;
      --bg-soft: #fbfaf8;
      --surface: rgba(255, 255, 255, 0.82);
      --surface-strong: #ffffff;
      --surface-muted: rgba(255, 255, 255, 0.55);
      --border: rgba(40, 50, 63, 0.10);
      --border-strong: rgba(40, 50, 63, 0.18);
      --text: #1c222b;
      --text-soft: #58616d;
      --text-faint: #7b8491;
      --brand: #d71920;
      --brand-strong: #b50f18;
      --brand-soft: rgba(215, 25, 32, 0.10);
      --danger: #d71920;
      --danger-soft: rgba(215, 25, 32, 0.10);
      --success: #0f8f61;
      --success-soft: rgba(15, 143, 97, 0.10);
      --warn: #b7791f;
      --warn-soft: rgba(183, 121, 31, 0.10);
      --info: #2563eb;
      --info-soft: rgba(37, 99, 235, 0.10);
      --shadow: 0 20px 50px rgba(19, 30, 41, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    body[data-theme='light2'] {
      color-scheme: light;
      --bg: #ece8e1;
      --bg-soft: #f5f1ea;
      --surface: rgba(252, 249, 244, 0.88);
      --surface-strong: #f8f4ee;
      --surface-muted: rgba(250, 246, 239, 0.74);
      --border: rgba(64, 72, 84, 0.14);
      --border-strong: rgba(64, 72, 84, 0.22);
    }

    body[data-theme='dark'] {
      color-scheme: dark;
      --bg: #0a0f1e;
      --bg-soft: #0f172a;
      --surface: rgba(15, 23, 42, 0.94);
      --surface-strong: #0f172a;
      --surface-muted: rgba(30, 41, 59, 0.78);
      --border: rgba(51, 65, 85, 0.95);
      --border-strong: rgba(71, 85, 105, 0.96);
      --text: #f8fafc;
      --text-soft: #cbd5e1;
      --text-faint: #94a3b8;
      --brand: #22c55e;
      --brand-strong: #15803d;
      --brand-soft: rgba(34, 197, 94, 0.16);
      --danger: #f87171;
      --danger-soft: rgba(248, 113, 113, 0.16);
      --success: #22c55e;
      --success-soft: rgba(34, 197, 94, 0.16);
      --warn: #facc15;
      --warn-soft: rgba(250, 204, 21, 0.16);
      --info: #38bdf8;
      --info-soft: rgba(56, 189, 248, 0.16);
      --shadow: 0 22px 48px rgba(2, 6, 23, 0.42);
    }

    body[data-theme='hsbc-dark'] {
      color-scheme: dark;
      --bg: #05070b;
      --bg-soft: #0b1017;
      --surface: rgba(14, 18, 24, 0.96);
      --surface-strong: #11161d;
      --surface-muted: rgba(24, 30, 40, 0.84);
      --border: rgba(68, 78, 93, 0.92);
      --border-strong: rgba(92, 105, 122, 0.98);
      --text: #f5f7fa;
      --text-soft: #d3d9e2;
      --text-faint: #9aa6b8;
      --brand: #db0011;
      --brand-strong: #8f0010;
      --brand-soft: rgba(219, 0, 17, 0.18);
      --danger: #ff7b86;
      --danger-soft: rgba(255, 123, 134, 0.18);
      --success: #52d48f;
      --success-soft: rgba(82, 212, 143, 0.16);
      --warn: #f7c948;
      --warn-soft: rgba(247, 201, 72, 0.16);
      --info: #68c4ff;
      --info-soft: rgba(104, 196, 255, 0.16);
      --shadow: 0 24px 54px rgba(0, 0, 0, 0.46);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(215, 25, 32, 0.06), transparent 32%),
        linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 100%);
      color: var(--text);
      transition: background 180ms ease, color 180ms ease;
    }

    body[data-theme='dark'] {
      background: #0a0f1e;
    }

    body[data-theme='hsbc-dark'] {
      background: #05070b;
    }

    button, input, select {
      font: inherit;
    }

    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(127, 137, 149, 0.35);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }

    body[data-theme='dark'] ::-webkit-scrollbar { width: 6px; height: 6px; }
    body[data-theme='dark'] ::-webkit-scrollbar-track { background: #1e293b; }
    body[data-theme='dark'] ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 999px;
      border: 0;
    }

    body[data-theme='hsbc-dark'] ::-webkit-scrollbar { width: 6px; height: 6px; }
    body[data-theme='hsbc-dark'] ::-webkit-scrollbar-track { background: #171d26; }
    body[data-theme='hsbc-dark'] ::-webkit-scrollbar-thumb {
      background: #5c0b15;
      border-radius: 999px;
      border: 0;
    }

    .shell {
      max-width: 1480px;
      margin: 0 auto;
      padding: 24px;
    }

    .desktop-menubar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      position: relative;
      z-index: 40;
    }

    .desktop-menubar__group {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .desktop-menubar__status {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .desktop-menubar__status-item {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-soft);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .desktop-nav {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .desktop-nav__button {
      min-width: 38px;
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-muted);
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .desktop-nav__button:hover {
      background: color-mix(in srgb, var(--brand-soft) 68%, var(--surface-muted));
      border-color: color-mix(in srgb, var(--brand) 18%, transparent);
      transform: translateY(-1px);
    }

    .desktop-nav__button:focus-visible {
      outline: 2px solid color-mix(in srgb, var(--brand) 70%, white);
      outline-offset: 2px;
    }

    .desktop-nav__button--home {
      font-size: 13px;
      padding: 0 14px;
    }

    .desktop-nav__label {
      font-size: 13px;
      white-space: nowrap;
    }

    .desktop-menubar__status .desktop-menu__panel {
      left: auto;
      right: 0;
    }

    .desktop-menu {
      position: relative;
    }

    .desktop-menu__button {
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 10px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .desktop-menu__button-icon {
      font-size: 13px;
      line-height: 1;
    }

    .desktop-menu__button-label {
      white-space: nowrap;
    }

    .desktop-menu__button:hover,
    .desktop-menu__button--open {
      background: var(--surface-muted);
      border-color: var(--border);
    }

    .desktop-menu__button--open {
      color: var(--brand);
    }

    .desktop-menu__panel {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      min-width: 260px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      display: grid;
      gap: 10px;
      z-index: 80;
    }

    .desktop-menu__panel--wide {
      min-width: 360px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .desktop-menu__section {
      display: grid;
      gap: 6px;
    }

    .desktop-menu__section-title {
      margin: 0;
      padding: 4px 8px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-faint);
    }

    .desktop-menu__item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }

    .desktop-menu__item:hover {
      background: color-mix(in srgb, var(--brand-soft) 72%, var(--surface-muted));
      border-color: color-mix(in srgb, var(--brand) 18%, transparent);
      transform: translateY(-1px);
    }

    .desktop-menu__item:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .desktop-menu__item-label {
      font-size: 13px;
      font-weight: 650;
    }

    .desktop-menu__item-meta {
      font-size: 11px;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      align-items: flex-start;
      position: relative;
      z-index: 30;
      overflow: visible;
      padding: 18px 22px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-strong);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      margin-top: 14px;
    }

    .brand { display: flex; gap: 14px; align-items: center; }
    .brand__mark {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      color: white;
      font-weight: 700;
      letter-spacing: 0.08em;
      box-shadow: 0 16px 30px color-mix(in srgb, var(--brand) 32%, transparent);
    }
    .brand__eyebrow {
      margin: 0 0 4px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: var(--brand);
      font-weight: 700;
    }
    .brand__profile-name {
      text-transform: none;
      letter-spacing: 0.05em;
      color: var(--text-soft);
      font-weight: 500;
    }
    .brand__title {
      margin: 0;
      font-size: 26px;
      line-height: 1.1;
    }
    .brand__subtitle {
      margin: 8px 0 0;
      color: var(--text-soft);
      max-width: 760px;
      font-size: 15px;
    }

    .topbar__actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
      align-items: center;
    }

    .topbar__controls {
      display: flex;
      align-items: stretch;
      gap: 10px;
      flex-wrap: wrap;
    }

    .menu-wrap {
      position: relative;
      z-index: 31;
    }

    .menu-button {
      min-width: 220px;
      min-height: 56px;
      padding: 10px 14px 10px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text);
      font-weight: 650;
      cursor: pointer;
      text-align: left;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-areas:
        'label caret'
        'value caret';
      column-gap: 12px;
      row-gap: 2px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .menu-button:hover {
      transform: translateY(-1px);
      border-color: var(--border-strong);
    }

    .menu-button__label {
      grid-area: label;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-faint);
      font-weight: 700;
    }

    .menu-button__value {
      grid-area: value;
      font-size: 14px;
      color: var(--text);
      font-weight: 700;
    }

    .menu-button__caret {
      grid-area: caret;
      align-self: center;
      font-size: 15px;
      color: var(--brand);
      transition: transform 140ms ease;
    }

    .menu-button__caret--open {
      transform: rotate(180deg);
    }

    .menu-panel {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: 220px;
      padding: 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-strong);
      box-shadow: var(--shadow);
      display: grid;
      gap: 6px;
      z-index: 70;
    }

    .menu-panel__item {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      font-weight: 600;
      text-align: left;
      cursor: pointer;
    }

    .menu-panel__item:hover {
      background: color-mix(in srgb, var(--brand-soft) 72%, var(--surface-muted));
      color: var(--text);
      border-color: color-mix(in srgb, var(--brand) 12%, transparent);
    }

    .menu-panel__item--active {
      background: var(--brand-soft);
      color: var(--brand);
      border-color: color-mix(in srgb, var(--brand) 24%, transparent);
    }

    .button,
    .segmented__option,
    .tab {
      border: 1px solid transparent;
      border-radius: 999px;
      transition: all 140ms ease;
      cursor: pointer;
    }

    .theme-select {
      display: grid;
      grid-template-columns: 1fr;
      align-content: center;
      gap: 4px;
      padding: 10px 14px 10px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--surface-muted);
      color: var(--text-soft);
      min-width: 220px;
      min-height: 56px;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
    }

    .theme-select__label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--text-faint);
      white-space: nowrap;
    }

    .theme-select__control {
      border: 0;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
      outline: none;
      min-width: 0;
      cursor: pointer;
      padding: 0;
    }

    .refresh-select {
      min-width: 220px;
    }

    .menu-button,
    .theme-select,
    .refresh-select {
      height: 56px;
    }

    .menu-button:focus-visible,
    .theme-select:focus-within {
      outline: 2px solid color-mix(in srgb, var(--brand) 70%, white);
      outline-offset: 2px;
      border-color: color-mix(in srgb, var(--brand) 46%, var(--border-strong));
    }

    .status-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-faint);
      white-space: nowrap;
    }
    .status-indicator__dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: currentColor;
      display: inline-block;
    }
    .status-indicator--live { color: var(--brand); }
    .status-indicator--flow { color: var(--brand); }
    .status-indicator--warn { color: var(--warn); }
    .status-indicator--idle { color: var(--text-faint); }

    body[data-theme='dark'] .topbar,
    body[data-theme='dark'] .panel,
    body[data-theme='dark'] .desktop-menubar,
    body[data-theme='hsbc-dark'] .topbar,
    body[data-theme='hsbc-dark'] .panel,
    body[data-theme='hsbc-dark'] .desktop-menubar {
      backdrop-filter: none;
    }

    body[data-theme='dark'] .topbar,
    body[data-theme='dark'] .desktop-menubar,
    body[data-theme='hsbc-dark'] .topbar,
    body[data-theme='hsbc-dark'] .desktop-menubar {
      background: #0f172a;
      border-color: var(--border);
      box-shadow: none;
    }

    body[data-theme='hsbc-dark'] .topbar,
    body[data-theme='hsbc-dark'] .desktop-menubar {
      background: #11161d;
    }

    body[data-theme='dark'] .panel,
    body[data-theme='hsbc-dark'] .panel {
      background: #0f172a;
      border-color: var(--border);
      box-shadow: none;
    }

    body[data-theme='hsbc-dark'] .panel {
      background: #11161d;
    }

    body[data-theme='dark'] .panel--subtle,
    body[data-theme='hsbc-dark'] .panel--subtle {
      background: transparent;
      box-shadow: none;
    }

    body[data-theme='dark'] .menu-button,
    body[data-theme='dark'] .theme-select,
    body[data-theme='dark'] .compact-card,
    body[data-theme='dark'] .segmented,
    body[data-theme='dark'] .event,
    body[data-theme='dark'] .order-row,
    body[data-theme='dark'] .market-hint,
    body[data-theme='dark'] .orders-table__scroll,
    body[data-theme='dark'] .empty-state,
    body[data-theme='hsbc-dark'] .menu-button,
    body[data-theme='hsbc-dark'] .theme-select,
    body[data-theme='hsbc-dark'] .compact-card,
    body[data-theme='hsbc-dark'] .segmented,
    body[data-theme='hsbc-dark'] .event,
    body[data-theme='hsbc-dark'] .order-row,
    body[data-theme='hsbc-dark'] .market-hint,
    body[data-theme='hsbc-dark'] .orders-table__scroll,
    body[data-theme='hsbc-dark'] .empty-state {
      background: #1e293b;
      border-color: var(--border);
      box-shadow: none;
    }

    body[data-theme='hsbc-dark'] .menu-button,
    body[data-theme='hsbc-dark'] .theme-select,
    body[data-theme='hsbc-dark'] .compact-card,
    body[data-theme='hsbc-dark'] .segmented,
    body[data-theme='hsbc-dark'] .event,
    body[data-theme='hsbc-dark'] .order-row,
    body[data-theme='hsbc-dark'] .market-hint,
    body[data-theme='hsbc-dark'] .orders-table__scroll,
    body[data-theme='hsbc-dark'] .empty-state {
      background: #171d26;
    }

    body[data-theme='dark'] .menu-panel,
    body[data-theme='dark'] .desktop-menu__panel,
    body[data-theme='hsbc-dark'] .menu-panel,
    body[data-theme='hsbc-dark'] .desktop-menu__panel {
      background: #0f172a;
      border-color: var(--border);
      box-shadow: none;
    }

    body[data-theme='hsbc-dark'] .menu-panel,
    body[data-theme='hsbc-dark'] .desktop-menu__panel {
      background: #11161d;
    }

    body[data-theme='hsbc-dark'] .menu-button:hover {
      background: #1c232d;
      border-color: #5c6674;
    }

    body[data-theme='hsbc-dark'] .menu-panel__item:hover {
      background: #5c0b15;
      color: #ffffff;
      border-color: rgba(219, 0, 17, 0.42);
    }

    body[data-theme='hsbc-dark'] .menu-panel__item--active {
      background: rgba(219, 0, 17, 0.12);
      color: #ffc4ca;
      border-color: rgba(219, 0, 17, 0.24);
    }

    body[data-theme='dark'] .field input,
    body[data-theme='dark'] .field select,
    body[data-theme='hsbc-dark'] .field input,
    body[data-theme='hsbc-dark'] .field select {
      background: #1e293b;
      border-color: var(--border);
    }

    body[data-theme='hsbc-dark'] .field input,
    body[data-theme='hsbc-dark'] .field select {
      background: #171d26;
    }

    body[data-theme='dark'] .template-picker__control,
    body[data-theme='hsbc-dark'] .template-picker__control {
      background: #1e293b;
      border-color: var(--border);
    }

    body[data-theme='hsbc-dark'] .template-picker__control {
      background: #171d26;
    }

    body[data-theme='dark'] .field input:focus,
    body[data-theme='dark'] .field select:focus,
    body[data-theme='hsbc-dark'] .field input:focus,
    body[data-theme='hsbc-dark'] .field select:focus {
      border-color: color-mix(in srgb, var(--brand) 65%, white);
      box-shadow: 0 0 0 4px color-mix(in srgb, var(--brand) 18%, transparent);
    }

    body[data-theme='dark'] .button,
    body[data-theme='dark'] .tab,
    body[data-theme='dark'] .segmented__option,
    body[data-theme='hsbc-dark'] .button,
    body[data-theme='hsbc-dark'] .tab,
    body[data-theme='hsbc-dark'] .segmented__option {
      box-shadow: none;
    }

    body[data-theme='dark'] .button,
    body[data-theme='hsbc-dark'] .button {
      background: #1e293b;
      border-color: var(--border);
    }

    body[data-theme='hsbc-dark'] .button {
      background: #171d26;
    }

    body[data-theme='dark'] .button--soft,
    body[data-theme='hsbc-dark'] .button--soft {
      background: var(--brand-soft);
      color: var(--brand);
      border-color: color-mix(in srgb, var(--brand) 24%, transparent);
    }

    body[data-theme='dark'] .button--ghost,
    body[data-theme='hsbc-dark'] .button--ghost {
      background: transparent;
      color: #e2e8f0;
    }

    body[data-theme='dark'] .button--success,
    body[data-theme='hsbc-dark'] .button--success {
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
