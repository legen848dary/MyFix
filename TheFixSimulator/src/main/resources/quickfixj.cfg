# QuickFIX/J Session Configuration
# Supports multiple FIX sessions (one block per session)

[DEFAULT]
ConnectionType=acceptor
SocketAcceptHost=0.0.0.0
SocketAcceptPort=9880
HeartBtInt=30
ResetOnLogon=Y
ResetOnLogout=Y
ResetOnDisconnect=Y
UseDataDictionary=Y
ValidateUserDefinedFields=N
ValidateIncomingMessage=N

# Session schedule — 00:00:00/00:00:00 means 24/7 (always active, no scheduled
# disconnect). Required by QuickFIX/J DefaultSessionSchedule; omitting either
# field causes a fatal ConfigError on startup.
StartTime=00:00:00
EndTime=00:00:00
TimeZone=UTC

# Low-latency socket settings
SocketNodelay=Y

# For low-latency simulator runs, disable FIX session-store persistence.
# Raw FIX messages are still written to FileLogPath for debugging / inspection.
PersistMessages=N
FileStorePath=logs/quickfixj
FileLogPath=logs/quickfixj

# ── FIX 4.2 Session ───────────────────────────────────────────────────────────
[SESSION]
BeginString=FIX.4.2
SenderCompID=LLEXSIM
TargetCompID=CLIENT1
DataDictionary=FIX42.xml

# ── FIX 4.4 Session ───────────────────────────────────────────────────────────
[SESSION]
BeginString=FIX.4.4
SenderCompID=LLEXSIM
TargetCompID=CLIENT1
DataDictionary=FIX44.xml

# ── FIX 5.0 Session ───────────────────────────────────────────────────────────
[SESSION]
BeginString=FIXT.1.1
DefaultApplVerID=FIX.5.0
SenderCompID=LLEXSIM
TargetCompID=CLIENT1
TransportDataDictionary=FIXT11.xml
AppDataDictionary=FIX50.xml

# ── FIX 5.0 SP2 Session ───────────────────────────────────────────────────────
[SESSION]
BeginString=FIXT.1.1
DefaultApplVerID=FIX.5.0SP2
SenderCompID=LLEXSIM
TargetCompID=CLIENT2
TransportDataDictionary=FIXT11.xml
AppDataDictionary=FIX50SP2.xml

