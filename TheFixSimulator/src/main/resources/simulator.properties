# ?? FIX Engine (QuickFIX/J) ???????????????????????????????????????????????????
fix.host=0.0.0.0
fix.port=9880
fix.log.dir=logs/artio-state/data
# Enable only when you explicitly need raw FIX message dumps.
# Leaving this off avoids per-message disk I/O during soak runs; prefer the
# simulator session diagnostics exposed via /api/sessions for disconnect triage.
fix.raw.message.logging.enabled=false

# ?? Disruptor ?????????????????????????????????????????????????????????????????
# Ring buffer size MUST be a power of 2
ring.buffer.size=131072
# BUSY_SPIN for lowest latency (uses 100% of one core); SLEEPING for lower CPU
wait.strategy=BUSY_SPIN

# ?? Order Repository ?????????????????????????????????????????????????????????
order.pool.size=131072

# ?? Web Server ????????????????????????????????????????????????????????????????
web.port=8080

# ?? Benchmark Mode ????????????????????????????????????????????????????????????
# When true, keep the REST server but disable live Aeron/WebSocket metrics fan-out
# so latency runs avoid non-essential background work.
benchmark.mode.enabled=false

# ?? Aeron IPC (metrics pipeline) ?????????????????????????????????????????????
# Use /tmp on macOS / local bare-metal runs; override to /dev/shm in Docker/Linux.
aeron.dir=/tmp/aeron-llexsim

# ?? Artio IPC ?????????????????????????????????????????????????????????????????
# Keep IPC term length modest so shared-memory startup does not require ~200 MB per publication.
artio.library.aeron.channel=aeron:ipc?term-length=8388608

# ?? Metrics IPC ???????????????????????????????????????????????????????????????
# Metrics snapshots are tiny; use a much smaller IPC term buffer than the Artio session traffic.
metrics.aeron.channel=aeron:ipc?term-length=65536

# ?? Metrics ???????????????????????????????????????????????????????????????????
# Publish a MetricsSnapshot to WebSocket every N processed orders
metrics.publish.interval=500

