# ?? FIX Engine (QuickFIX/J) ???????????????????????????????????????????????????
fix.host=0.0.0.0
fix.port=9880
fix.log.dir=logs/artio-state/data
# Enable only when you explicitly need raw FIX message dumps.
# Leaving this off avoids per-message disk I/O during soak runs; prefer the
# simulator session diagnostics exposed via /api/sessions for disconnect triage.
fix.raw.message.logging.enabled=false

# ?? Disruptor ?????????????????????????????????????????????????????????????????
# Ring buffer size MUST be a power of 2
ring.buffer.size=131072
# Legacy fallback used when a thread-specific override below is absent.
wait.strategy=BUSY_SPIN
# Ultra-low-latency hot path: keep both of these on BUSY_SPIN.
# The metrics subscriber is off the critical order path, so it can usually stay
# at SLEEPING unless you explicitly want the GUI metrics bridge to busy-spin too.
# Supported values:
#   Disruptor: BUSY_SPIN / YIELDING / SLEEPING / BLOCKING
#   Poller loops: BUSY_SPIN / YIELDING / BACKOFF / SLEEPING / NOOP
wait.strategy.disruptor=BUSY_SPIN
wait.strategy.fix.poller=BUSY_SPIN
wait.strategy.metrics.subscriber=SLEEPING

# ?? Order Repository ?????????????????????????????????????????????????????????
order.pool.size=131072

# ?? Web Server ????????????????????????????????????????????????????????????????
web.port=8080

# ?? Benchmark Mode ????????????????????????????????????????????????????????????
# When true, keep the REST server but disable live Aeron/WebSocket metrics fan-out
# so latency runs avoid non-essential background work.
# It also forces the benchmark threading profile at startup:
#   wait.strategy.disruptor=BUSY_SPIN
#   wait.strategy.fix.poller=BUSY_SPIN
#   wait.strategy.metrics.subscriber=BUSY_SPIN (configured, but subscriber is disabled)
#   aeron.threading.mode=DEDICATED
#   aeron.conductor.idle.strategy=busy_spin
#   aeron.sender.idle.strategy=noop
#   aeron.receiver.idle.strategy=noop
benchmark.mode.enabled=false

# ?? Aeron IPC (metrics pipeline) ?????????????????????????????????????????????
# Use /tmp on macOS / local bare-metal runs; override to /dev/shm in Docker/Linux.
aeron.dir=/tmp/aeron-llexsim

# ?? Artio IPC ?????????????????????????????????????????????????????????????????
# Keep IPC term length modest so shared-memory startup does not require ~200 MB per publication.
artio.library.aeron.channel=aeron:ipc?term-length=8388608

# ?? Aeron thread strategies ???????????????????????????????????????????????????
# For the lowest transport latency in DEDICATED mode, keep conductor=busy_spin
# and sender/receiver=noop. Sender/receiver use 'noop' rather than BUSY_SPIN
# because that is Aeron's most aggressive busy-poll option for those loops.
# These mirror the JVM flags, but simulator.properties can now define them too.
aeron.threading.mode=DEDICATED
aeron.conductor.idle.strategy=busy_spin
aeron.sender.idle.strategy=noop
aeron.receiver.idle.strategy=noop
aeron.shared.idle.strategy=backoff
aeron.shared.network.idle.strategy=backoff

# ?? Metrics IPC ???????????????????????????????????????????????????????????????
# Metrics snapshots are tiny; use a much smaller IPC term buffer than the Artio session traffic.
metrics.aeron.channel=aeron:ipc?term-length=65536

# ?? Metrics ???????????????????????????????????????????????????????????????????
# Publish a MetricsSnapshot to WebSocket every N processed orders
metrics.publish.interval=500
