# Docker/local override for LLExSimulator
#
# This file is mounted into the container at /app/config/simulator.properties.
# It deliberately favours stable local testing on Docker Desktop over absolute
# lowest-possible latency.
#
# Ultra-low-latency recommendation:
#   MUST set BUSY_SPIN:
#     - wait.strategy.disruptor
#     - wait.strategy.fix.poller
#   Usually keep non-critical/background work softer:
#     - wait.strategy.metrics.subscriber=SLEEPING
#   For Aeron dedicated mode, keep:
#     - aeron.conductor.idle.strategy=busy_spin
#     - aeron.sender.idle.strategy=noop
#     - aeron.receiver.idle.strategy=noop
#
# That keeps the matching/FIX hot path aggressive without spending another core
# on the live metrics bridge.

# FIX Engine
fix.host=0.0.0.0
fix.port=9880

# Artio state directory ? intentionally NOT under ./logs (which is a macOS bind-mount).
#
# Artio's SequenceNumberIndexWriter flushes two 8 MB memory-mapped files to disk every
# ~term-length worth of FIX messages (checkTermRoll ? updateFile ? writableFile.force()).
# With term-length=8388608 and ~350 bytes/msg that fires every ~24,000 messages.
# On Docker Desktop / macOS, fsync() through a VirtioFS bind-mount stalls for several
# seconds and blocks the Artio engine thread long enough that the QuickFIX/J client's
# HeartBtInt+1 timer fires ? REMOTE_DISCONNECT.
#
# We use SessionPersistenceStrategy.alwaysTransient(), so the sequence-number files
# don't need to survive a container restart anyway.  docker-compose.yml mounts
# /tmp/artio-state as a tmpfs so all fsyncs are pure RAM operations (no-op on disk).
#
# IMPORTANT: fix.log.dir must be a SUB-DIRECTORY of the tmpfs mount point, not the
# mount point itself.  EngineConfiguration.deleteLogFileDirOnStart calls
# IoUtil.delete() which removes the directory itself; deleting a Linux mount point
# returns EBUSY.  /tmp/artio-state/data sits ON the tmpfs (fast) but can be freely
# deleted and recreated by Artio on each container start.
fix.log.dir=/tmp/artio-state/data

fix.raw.message.logging.enabled=false

# Disruptor + FIX poller
# Ultra-low-latency hot path:
#   wait.strategy.disruptor=BUSY_SPIN
#   wait.strategy.fix.poller=BUSY_SPIN
# Background/GUI metrics path can usually stay softer:
#   wait.strategy.metrics.subscriber=SLEEPING
ring.buffer.size=131072
# Legacy fallback when a thread-specific override below is absent.
wait.strategy=SLEEPING
#wait.strategy.disruptor=SLEEPING
wait.strategy.disruptor=BUSY_SPIN
#wait.strategy.fix.poller=BACKOFF
wait.strategy.fix.poller=BUSY_SPIN
wait.strategy.metrics.subscriber=SLEEPING
#wait.strategy.metrics.subscriber=BUSY_SPIN

# Order Repository
order.pool.size=131072

# Web Server
web.port=8080

# Benchmark Mode
# Keeps REST/health available but disables live Aeron/WebSocket metrics fan-out.
# When true, the simulator also forces the aggressive benchmark threading
# profile at startup:
#   wait.strategy.disruptor=BUSY_SPIN
#   wait.strategy.fix.poller=BUSY_SPIN
#   wait.strategy.metrics.subscriber=BUSY_SPIN (configured, but subscriber is disabled)
#   aeron.threading.mode=DEDICATED
#   aeron.conductor.idle.strategy=busy_spin
#   aeron.sender.idle.strategy=noop
#   aeron.receiver.idle.strategy=noop
benchmark.mode.enabled=false

# Aeron IPC
# Local macOS-friendly default. Docker/Linux can still prefer /dev/shm via JVM args;
# the simulator will fall back to /tmp automatically if usable shared memory is too small.
aeron.dir=/tmp/aeron-llexsim

# Artio library IPC
# Smaller IPC term buffers prevent 200 MB shared-memory allocations per publication.
# NOTE: term-length determines how frequently checkTermRoll fires (every ~term-length/350
# bytes of FIX messages ? 24,000 msgs at 8 MB). Increasing this reduces roll frequency
# but increases the size of the memory-mapped state files that get fsynced each roll.
# With fix.log.dir on a fast filesystem the 8 MB value is fine; leave it as is.
artio.library.aeron.channel=aeron:ipc?term-length=8388608

# Aeron driver threads
# For the lowest transport latency in DEDICATED mode, keep:
#   aeron.conductor.idle.strategy=busy_spin
#   aeron.sender.idle.strategy=noop
#   aeron.receiver.idle.strategy=noop
# Sender/receiver use 'noop' rather than BUSY_SPIN because Aeron treats that as
# the most aggressive busy-poll option for those loops.
aeron.threading.mode=DEDICATED
aeron.conductor.idle.strategy=busy_spin
aeron.sender.idle.strategy=noop
aeron.receiver.idle.strategy=noop
aeron.shared.idle.strategy=backoff
aeron.shared.network.idle.strategy=backoff

# Metrics IPC
metrics.aeron.channel=aeron:ipc?term-length=65536

# Metrics
metrics.publish.interval=500
