# LLExSimulator target droplet sizing
#
# Edit these two values to describe the deployment size you want the scripts to tune for.
# The build/rebuild/start/release flows will read this file automatically and derive:
#   - simulator JVM heap
#   - simulator Docker memory/shm limits
#   - demo FIX client heap/memory limits
#   - simulator ring buffer / order pool sizing for small hosts
#
# Example targets:
#   2 CPU / 2 GB  -> target.cpu.count=2, target.ram.gb=2
#   2 CPU / 4 GB  -> target.cpu.count=2, target.ram.gb=4
#   4 CPU / 8 GB  -> target.cpu.count=4, target.ram.gb=8

target.cpu.count=2
target.ram.gb=4

